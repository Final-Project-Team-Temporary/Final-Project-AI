version: '3.8'

services:
  # MongoDB (내장)
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  # Redis (내장)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  # FastAPI 서버
  econoeasy-api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      # 컨테이너 내부에서는 서비스명으로 접근
      - MONGO_URI=mongodb://mongodb:27017
      - REDIS_HOST=redis
      - CHROMA_HOST=chromadb
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
      - redis
      - chromadb
    restart: unless-stopped

  # 백그라운드 워커1 (기사 요약)
  econoeasy-worker-article:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: python -m app.services.queue.worker
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - REDIS_HOST=redis
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  # 백그라운드 워커2 (영상 추천)
  econoeasy-worker-recommend:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: python -m app.services.recommend_queue.worker
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - REDIS_HOST=redis
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  # 백그라운드 워커3 (키워드 추출)
  econoeasy-worker-keyword:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: python -m app.services.keyword_queue.worker
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - REDIS_HOST=redis
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  # 벡터 DB (RAG)
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

volumes:
  mongodb_data:
  chroma_data:
